[build]
  base = "four-boxes-blog"
  command = "npm run build"
  publish = "four-boxes-blog/dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "four-boxes-blog/netlify/functions"
  included_files = ["four-boxes-blog/data/**"]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
